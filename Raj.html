<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Image Tool</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

.option{
    text-align:center;
    margin-bottom:20px;
}

.option button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
}

.compressBtn{ background:#16a34a; color:white; }
.enhanceBtn{ background:#2563eb; color:white; }

.panel{
    background:#334155;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
}

.preview{
    display:flex;
    gap:20px;
    margin-top:25px;
}

.box{
    flex:1;
    text-align:center;
}

img{
    max-width:100%;
    border-radius:8px;
}

button.action{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#f97316;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>Smart Image Compressor & Enhancer</h2>
</header>

<div class="container">
<div class="card">

<div class="option">
<h3>What do you want?</h3>
<button class="compressBtn" onclick="selectMode('compress')">Compress Image</button>
<button class="enhanceBtn" onclick="selectMode('enhance')">Enhance Image</button>
</div>

<input type="file" id="upload" accept="image/*">

<div id="compressPanel" class="panel" style="display:none;">
<h3>Compression Settings</h3>
<label>Target Size (KB):</label><br>
<input type="number" id="targetSize" placeholder="Example: 10"><br>
<button class="action" onclick="compressToTarget()">Compress Now</button>
</div>

<div id="enhancePanel" class="panel" style="display:none;">
<h3>Enhancement</h3>
<button class="action" onclick="enhanceImage()">Enhance Now</button>
</div>

<div class="preview">
<div class="box">
<h4>Before</h4>
<img id="beforeImg">
<p>Size: <span id="beforeSize">-</span></p>
</div>

<div class="box">
<h4>After</h4>
<img id="afterImg">
<p>Size: <span id="afterSize">-</span></p>
<p>Change: <span id="changePercent">-</span></p>
<button class="action" onclick="downloadImage()">Download</button>
</div>
</div>

</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let mode = "";
let originalFileSize = 0;
let originalImage = null;
let finalBlob = null;

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function selectMode(selected){
    mode = selected;
    document.getElementById("compressPanel").style.display =
        mode==="compress" ? "block" : "none";
    document.getElementById("enhancePanel").style.display =
        mode==="enhance" ? "block" : "none";
}

upload.addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    originalFileSize = file.size;
    document.getElementById("beforeSize").innerText =
        (originalFileSize/1024).toFixed(2)+" KB";

    const reader = new FileReader();
    reader.onload = function(event){
        originalImage = new Image();
        originalImage.src = event.target.result;
        originalImage.onload = function(){
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage,0,0);
            document.getElementById("beforeImg").src = canvas.toDataURL();
        }
    }
    reader.readAsDataURL(file);
});

async function compressToTarget(){
    if(!originalImage){
        alert("Upload image first");
        return;
    }

    const targetKB = parseFloat(document.getElementById("targetSize").value);
    if(!targetKB){
        alert("Enter target size");
        return;
    }

    const targetBytes = targetKB * 1024;

    let minQ=0.1, maxQ=1.0, blob;

    for(let i=0;i<12;i++){
        let q=(minQ+maxQ)/2;
        blob = await new Promise(res =>
            canvas.toBlob(res,"image/jpeg",q)
        );
        if(blob.size > targetBytes) maxQ=q;
        else minQ=q;
    }

    finalBlob = blob;
    updateAfter(blob);
}

function enhanceImage(){
    if(!originalImage){
        alert("Upload image first");
        return;
    }

    ctx.drawImage(originalImage,0,0);

    let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let data = imgData.data;

    const kernel = [0,-1,0,-1,5,-1,0,-1,0];
    let w = canvas.width;
    let h = canvas.height;
    let output = ctx.createImageData(w,h);
    let dst = output.data;

    for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
            let r=0,g=0,b=0;
            for(let ky=0;ky<3;ky++){
                for(let kx=0;kx<3;kx++){
                    let px=x+kx-1;
                    let py=y+ky-1;
                    if(px>=0 && px<w && py>=0 && py<h){
                        let offset=(py*w+px)*4;
                        let wt=kernel[ky*3+kx];
                        r+=data[offset]*wt;
                        g+=data[offset+1]*wt;
                        b+=data[offset+2]*wt;
                    }
                }
            }
            let dstOff=(y*w+x)*4;
            dst[dstOff]=Math.min(255,Math.max(0,r));
            dst[dstOff+1]=Math.min(255,Math.max(0,g));
            dst[dstOff+2]=Math.min(255,Math.max(0,b));
            dst[dstOff+3]=255;
        }
    }

    ctx.putImageData(output,0,0);

    canvas.toBlob(function(blob){
        finalBlob = blob;
        updateAfter(blob);
    },"image/jpeg",0.95);
}

function updateAfter(blob){
    document.getElementById("afterSize").innerText =
        (blob.size/1024).toFixed(2)+" KB";

    const change =
        ((blob.size-originalFileSize)/originalFileSize*100).toFixed(2);

    document.getElementById("changePercent").innerText =
        change+" %";

    const url = URL.createObjectURL(blob);
    document.getElementById("afterImg").src = url;
}

function downloadImage(){
    if(!finalBlob){
        alert("No processed image");
        return;
    }
    const link=document.createElement("a");
    link.download="processed-image.jpg";
    link.href=URL.createObjectURL(finalBlob);
    link.click();
}
</script>

</body>
</html>
